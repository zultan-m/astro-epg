name: Generate Astro EPG

on:
  schedule:
    - cron: '5 22 * * *'   # 6:00AM Malaysia (UTC+8)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pytz

      - name: Extract old EPG
        run: |
          if [ -f astro.xml.gz ]; then
            gunzip -f astro.xml.gz
            mv astro.xml astro_old.xml
          fi

      - name: Generate EPG
        run: |
          python epg.py 2>&1 | tee -a epg.log

      - name: Compress EPG
        run: |
          gzip -9 -f astro.xml

      - name: Commit changes
        run: |
          git config --global user.name "epg-bot"
          git config --global user.email "actions@github.com"

          git add astro.xml.gz epg.log
          git diff --cached --quiet || git commit -m "Auto update EPG & log"
          git push
