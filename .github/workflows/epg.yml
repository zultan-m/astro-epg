name: Generate EPG

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y mono-complete wget unzip

      - name: Download WebGrab+Plus (Latest)
        run: |
          wget https://www.webgrabplus.com/sites/default/files/download/WebGrabPlus_Linux_64.tar.gz
          tar -xzf WebGrabPlus_Linux_64.tar.gz
          mv WebGrabPlus/* .

      - name: Download SiteIniPack
        run: |
          wget http://webgrabplus.com/sites/default/files/download/SiteIniPack_current.zip
          unzip SiteIniPack_current.zip

      - name: Run WebGrab
        run: |
          mono WebGrab+Plus.exe

      - name: Commit epg.xml
        run: |
          git config user.name "epg-bot"
          git config user.email "epg@bot.com"
          git add epg.xml
          git commit -m "Auto update EPG" || echo "No changes"
          git push
