name: Generate Astro EPG

on:
  schedule:
    - cron: "0 15 * * 0"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install -r requirements.txt

      - run: python epg.py

      - name: Commit and push
        run: |
          git config --global user.name "epg-bot"
          git config --global user.email "epg-bot@users.noreply.github.com"
          git add astro.xml
          git commit -m "Auto update EPG" || echo "No changes"
          git push
