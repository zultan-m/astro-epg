name: Generate Astro EPG

on:
  schedule:
    - cron: '0 15 * * 4'
    - cron: '0 15 * * 0'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install requests pytz

      - name: Run EPG generator
        run: |
          python epg.py || python epg.py

      - name: Compress EPG (max compression)
        run: |
          gzip -9 -c astro.xml > astro.xml.gz

      - name: Commit and push
        run: |
          git config --global user.name "epg-bot"
          git config --global user.email "actions@github.com"

          git add astro.xml.gz

          git diff --cached --quiet || git commit -m "Auto update EPG"

          git push
