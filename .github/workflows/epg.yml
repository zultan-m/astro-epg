# ===== MERGE FUNCTION START =====
import os
import xml.etree.ElementTree as ET
from datetime import datetime, timedelta
import pytz


def merge_with_old(new_file="astro.xml"):

    if not os.path.exists("astro_old.xml"):
        return

    tz = pytz.timezone("Asia/Kuala_Lumpur")
    now = datetime.now(tz)

    past_cutoff = now - timedelta(days=7)
    future_limit = now + timedelta(days=14)

    old_tree = ET.parse("astro_old.xml")
    old_root = old_tree.getroot()

    new_tree = ET.parse(new_file)
    new_root = new_tree.getroot()

    programme_dict = {}

    for prog in new_root.findall("programme"):
        key = (prog.get("channel"), prog.get("start"))
        programme_dict[key] = prog

    for prog in old_root.findall("programme"):

        start_raw = prog.get("start")[:14]
        dt = datetime.strptime(start_raw, "%Y%m%d%H%M%S")
        dt = tz.localize(dt)

        key = (prog.get("channel"), prog.get("start"))

        if past_cutoff <= dt <= future_limit:
            if key not in programme_dict:
                programme_dict[key] = prog

    for prog in list(new_root.findall("programme")):
        new_root.remove(prog)

    sorted_programmes = sorted(
        programme_dict.values(),
        key=lambda p: (p.get("channel"), p.get("start"))
    )

    for prog in sorted_programmes:
        new_root.append(prog)

    new_tree.write(new_file, encoding="utf-8", xml_declaration=True)
# ===== MERGE FUNCTION END =====
